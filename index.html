<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1 class="logo">PIXEL QUEST</h1>
            <nav class="nav">
                <a href="#" data-page="tasks" class="nav-link active">Задачи</a>
                <a href="#" data-page="shop" class="nav-link">Магазин</a>
                <a href="#" data-page="leaders" class="nav-link">Лидеры</a>
                <a href="#" data-page="profile" class="nav-link">Профиль</a>
            </nav>
            <div class="auth-buttons">
                <button id="login-btn" class="btn btn-primary">Вход</button>
                <button id="register-btn" class="btn btn-secondary">Регистрация</button>
                <button id="logout-btn" class="btn btn-danger" style="display:none;">Выход</button>
            </div>
        </header>

        <main class="main">
            <!-- Auth Modal -->
            <div id="auth-modal" class="modal" style="display:none;">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <div id="auth-form-container">
                        <h2>Вход</h2>
                        <form id="login-form">
                            <input type="email" id="login-email" placeholder="Email" required>
                            <input type="password" id="login-password" placeholder="Пароль" required>
                            <button type="submit" class="btn btn-primary">Войти</button>
                        </form>
                        <p class="switch-auth">Нет аккаунта? <a href="#" id="switch-to-register">Зарегистрироваться</a></p>
                    </div>
                </div>
            </div>

            <!-- Tasks Page -->
            <div id="page-tasks" class="page active">
                <div class="layout">
                    <aside class="sidebar">
                        <div class="character-panel">
                            <h3>Ваш персонаж</h3>
                            <div class="character-sprite" id="character-sprite">
                                <div class="pixel-character"></div>
                            </div>
                            <div class="character-level">Ур. <span id="char-level">1</span></div>
                            <div class="attributes">
                                <div class="attr">
                                    <span class="attr-name">СИЛА</span>
                                    <div class="attr-bar"><div class="attr-fill strength" id="attr-strength"></div></div>
                                    <span class="attr-value" id="val-strength">1</span>
                                </div>
                                <div class="attr">
                                    <span class="attr-name">ИНТ</span>
                                    <div class="attr-bar"><div class="attr-fill intelligence" id="attr-intelligence"></div></div>
                                    <span class="attr-value" id="val-intelligence">1</span>
                                </div>
                                <div class="attr">
                                    <span class="attr-name">ЛОВ</span>
                                    <div class="attr-bar"><div class="attr-fill agility" id="attr-agility"></div></div>
                                    <span class="attr-value" id="val-agility">1</span>
                                </div>
                                <div class="attr">
                                    <span class="attr-name">ВЫН</span>
                                    <div class="attr-bar"><div class="attr-fill endurance" id="attr-endurance"></div></div>
                                    <span class="attr-value" id="val-endurance">1</span>
                                </div>
                            </div>
                            <div class="xp-section">
                                <div class="xp-text">XP: <span id="xp-current">0</span> / <span id="xp-needed">500</span></div>
                                <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
                            </div>
                            <div id="attr-points" class="attr-points" style="display:none;">
                                <p>Очки атрибутов: <span id="available-points">0</span></p>
                                <button class="btn btn-small" id="distribute-btn">Распределить</button>
                            </div>
                        </div>
                    </aside>
                    <section class="content">
                        <div class="tasks-header">
                            <h2>Мои задачи</h2>
                            <button id="add-task-btn" class="btn btn-primary">+ Новая</button>
                        </div>
                        <div id="tasks-list" class="tasks-list"></div>
                    </section>
                </div>
            </div>

            <!-- Task Modal -->
            <div id="task-modal" class="modal" style="display:none;">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h2 id="task-modal-title">Новая задача</h2>
                    <form id="task-form">
                        <input type="hidden" id="task-id">
                        <input type="text" id="task-title" placeholder="Название задачи" required>
                        <textarea id="task-description" placeholder="Описание (необязательно)"></textarea>
                        <select id="task-difficulty" required>
                            <option value="easy">Лёгкая (+50 XP)</option>
                            <option value="medium">Средняя (+150 XP)</option>
                            <option value="hard">Сложная (+300 XP)</option>
                        </select>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </form>
                </div>
            </div>

            <!-- Admin Page (hidden) -->
            <div id="page-admin" class="page" style="display:none;">
                <h2>Панель администратора</h2>
                <div class="admin-stats" id="admin-stats"></div>
                <div class="admin-users" id="admin-users"></div>
            </div>
        </main>
    </div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/character.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
